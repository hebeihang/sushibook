<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="SushiBook Studio - 生命感文案创作工具" />
  <title>SushiBook Studio</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>
  <div id="app">

    <!-- 错误横幅（初始化致命错误用） -->
    <div id="error-banner" role="alert"></div>

    <!-- 加载画面 -->
    <div id="loading-screen">
      <div class="loading-glyph">寿</div>
      <div class="loading-text">正在加载字体与故事…</div>
    </div>

    <!-- ===== 三栏：侧栏 | 编辑 | 预览 ===== -->
    <div id="studio-layout">

      <!-- ======== 左侧栏：资产 + 节点大纲 ======== -->
      <div id="sidebar">
        <div class="sidebar-section" id="asset-section">
          <div class="sidebar-header">
            <span class="sidebar-title">▾ 资源管理器</span>
            <button id="btn-asset-add" class="btn-icon" title="添加资产（URL/颜色/渐变）">＋</button>
          </div>
          <div id="asset-list"></div>
        </div>

        <div class="sidebar-section" id="outline-section">
          <div class="sidebar-header">
            <span class="sidebar-title">▾ 节点</span>
            <span id="outline-count" class="sidebar-count">0</span>
          </div>
          <div id="outline-list"></div>
        </div>

        <div class="sidebar-section" id="glossary-section">
          <div class="sidebar-header">
            <span class="sidebar-title">▾ 词汇表</span>
            <span id="glossary-count" class="sidebar-count">0</span>
          </div>
          <div id="glossary-list"></div>
        </div>
      </div>

      <!-- ======== 中间：SushiML 编辑器 ======== -->
      <div id="editor-pane">
        <div id="editor-header">
          <div class="editor-header-left">
            <span class="header-title">📝 SushiML</span>
            <span id="status-chip" class="status-chip ok">✓ 校验通过</span>
          </div>
          <div class="editor-actions">
            <button id="btn-ai" class="btn-accent" title="用 AI 生成分支故事">✨ AI 生成</button>
            <button id="btn-export" class="btn-ghost" title="导出为可双击独立打开的 HTML5 网页">⬇ 导出 HTML5</button>
            <button id="btn-apply" class="btn-primary" title="应用到预览（Ctrl+Enter）">▶ 应用</button>
          </div>
        </div>
        <div id="editor-mount"></div>
        <div id="problems-panel">
          <div id="problems-header">
            <span class="header-title">▾ 问题</span>
            <span id="problems-status">语法 + 语义校验通过</span>
          </div>
          <div id="problems-list"></div>
        </div>
      </div>

      <!-- 分栏拖拽条 -->
      <div id="split-bar"></div>

      <!-- ======== 右侧：预览 + 指令面板 ======== -->
      <div id="right-pane">
        <div id="preview-section">
          <div id="preview-header">
            <span class="header-title">👁 预览</span>
            <div id="preview-badges">
              <span id="badge-scene" class="badge">START</span>
              <span id="badge-mood" class="badge badge-mood">default</span>
              <button id="btn-restart" class="btn-ghost btn-restart" title="清档重开预览">↻ 重开预览</button>
            </div>
          </div>
          <div id="preview-canvas">
            <div id="preview-bg"></div>
          </div>
          <div id="preview-choices"></div>
        </div>

        <div id="directive-section">
          <div id="directive-header">
            <span class="header-title">🎬 指令面板</span>
            <span class="header-hint">点击插入到编辑器光标处 · 悬停查看说明</span>
          </div>
          <div id="directive-panel"></div>
        </div>
      </div>

    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
